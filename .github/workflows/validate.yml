name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate bundle
        run: python3 scripts/validate_bundle.py

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

  # Pulls the pinned CodeGenie MCP via npx — network-heavy, so manual trigger only.
  mcp-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke CodeGenie MCP
        run: python3 scripts/smoke_codegenie_mcp.py
